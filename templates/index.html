<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Name Maker</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .tiktok { color: #fe2c55; font-weight: bold; padding: 15px; display: block; }
        input { padding: 12px; width: 80%; border-radius: 8px; margin-bottom: 10px; background: #222; color: white; border: 1px solid #333; }
        button { padding: 12px 20px; background: #00f2ea; border: none; border-radius: 8px; font-weight: bold; }
        .row { display: flex; border-bottom: 1px solid #222; }
        .col { flex: 1; padding: 12px; font-size: 0.9rem; cursor: pointer; }
        .left { color: #00f2ea; border-right: 1px solid #333; }
        .right { color: #ff0050; }
    </style>
</head>
<body>
    <span class="tiktok">TikTok: {{ tiktok }}</span>
    <form method="POST">
        <input type="text" name="name" placeholder="Enter Name..." required>
        <button type="submit">Magic</button>
    </form>
    {% if styles %}
    <div style="margin-top:20px;">
        <div style="display:flex; background:#333; font-weight:bold; padding:10px 0;">
            <div style="flex:1">English</div><div style="flex:1">Arabic</div>
        </div>
        {% for s in styles %}
        <div class="row">
            <div class="col left" onclick="copy('{{s.eng}}')">{{ s.eng }}</div>
            <div class="col right" onclick="copy('{{s.arb}}')">{{ s.arb }}</div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    <script>function copy(t){navigator.clipboard.writeText(t);alert('Copied: '+t);}</script>
</body>
</html>
