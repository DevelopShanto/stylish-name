<!DOCTYPE html>
<html>
<head>
    <title>Name Styles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        .salem { color: #00f2ea; font-size: 1.2rem; margin: 10px 0; font-weight: bold; }
        .tiktok { color: #ff0050; font-weight: bold; }
        input { padding: 10px; border-radius: 5px; border: none; width: 70%; }
        button { padding: 10px 20px; background: #00f2ea; border: none; border-radius: 5px; font-weight: bold; }
        .row { display: flex; border-bottom: 1px solid #333; }
        .col { flex: 1; padding: 15px; cursor: pointer; font-size: 1rem; }
        .left { color: #00f2ea; border-right: 1px solid #444; }
        .right { color: #ff0050; font-family: 'serif'; }
    </style>
</head>
<body>
    <div class="salem">{{ salem }}</div>
    <div class="tiktok">TikTok: {{ tiktok }}</div>
    <form method="POST" style="margin-top:20px;">
        <input type="text" name="name" placeholder="Enter Name..." required>
        <button type="submit">Magic</button>
    </form>
    {% if styles %}
    <div style="margin-top:20px;">
        <div style="display:flex; background:#222; padding:10px 0; font-weight:bold;">
            <div style="flex:1">English Style</div>
            <div style="flex:1">Arabic Style</div>
        </div>
        {% for s in styles %}
        <div class="row">
            <div class="col left" onclick="copy('{{s.eng}}')">{{ s.eng }}</div>
            <div class="col right" onclick="copy('{{s.arb}}')">{{ s.arb }}</div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    <script>
        function copy(t){
            navigator.clipboard.writeText(t);
            alert('Copied: ' + t);
        }
    </script>
</body>
</html>
