<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Stylish Name</title>
    <style>
        body { background-color: #000; color: #00e5ff; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 10px; margin: 0; }
        .header-glow { text-shadow: 0 0 15px #00e5ff; font-size: 28px; margin: 20px 0 5px 0; }
        .social-info { font-size: 13px; font-weight: bold; margin-bottom: 20px; }
        .tiktok { color: #ff0050; }
        .facebook { color: #0084ff; }
        
        .container { background: #111; padding: 15px; border-radius: 20px; border: 1px solid #333; max-width: 480px; margin: auto; box-shadow: 0 0 20px rgba(0,229,255,0.1); }
        input { width: 85%; background: #050505; border: 2px solid #222; color: #fff; padding: 15px; margin-bottom: 20px; border-radius: 12px; font-size: 18px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00e5ff; box-shadow: 0 0 10px #00e5ff; }

        .name-card { background: #1a1a1a; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .name-card:hover { border-color: #00e5ff; transform: translateY(-2px); }
        .name-text { color: #fff; font-size: 19px; font-weight: 500; overflow-x: auto; white-space: nowrap; flex-grow: 1; text-align: left; padding-right: 10px; }
        
        .copy-btn { background: linear-gradient(45deg, #00e5ff, #0084ff); color: #000; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; box-shadow: 0 4px 10px rgba(0,229,255,0.3); }
        .copy-btn:active { transform: scale(0.95); }

        ::-webkit-scrollbar { height: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <h1 class="header-glow">As-salamu Alaykum</h1>
    <div class="social-info">
        <span class="tiktok">TikTok: @shanto2993</span> | 
        <span class="facebook">FB: Classic Boy Shanto</span>
    </div>

    <div class="container">
        <input type="text" id="nameInput" placeholder="Type name here..." oninput="generate()">
        <div id="resultArea"></div>
    </div>

    <script>
        function generate() {
            const n = document.getElementById('nameInput').value;
            const area = document.getElementById('resultArea');
            area.innerHTML = "";
            if(!n) return;

            // স্ক্রিনশটের স্টাইলগুলো এখানে অ্যাড করা হয়েছে
            const styles = [
                `───●ᵸ${n}●───`,
                `───☆❣️ ${n}❣️☆───`,
                `†❣️─── ${n} ───`,
                `i°ᶫᵒᵛᵉᵧₒᵤ ℐ${n}♡🌹`,
                `♡( ˘ ³˘) ♥ ${n} ♥♥♥♡`,
                `●.¸¸.⚬ ${n} ♡ ϐ♦ ¸.⚬●`,
                `ღ´ᴗ` ) [${n.toUpperCase()}]♡⃛( ´ᴗ` ღ)`,
                `“☆_♡◯_ ${n} _◯♡_☆”`,
                `𝒯 𝓁ℴ𝓋ℯ 𝓎ℴ𝓊 <3 ${n}`,
                `丂ん@ηтσℓσṿℰ 𝓎𝒪𝓊 .’`,
                `///♡/// ${n} ///♡///`,
                `${n}♡`,
                `♡~٩( ^▿^ )۶~♡ ${n}`,
                `♡//>_<//♡ ${n}`,
                `ღゝ◡╹)ノ♡ ${n} ♡(╹◡ゝღ`,
                `⚝⚝⚝⚝𝓿𝓮♡ ${n}`,
                `▀▄デ ${n} ───`,
                `⚝❊ ${n} ❊⚝`,
                `✨× ${n} ×✨`,
                `⊹ ${n.toUpperCase()} ⊹`,
                `♔〔 ${n.toUpperCase()} 〕♔`,
                `×͜×  ALONE  BOY ${n}`,
                `Cᵒᵒˡジ ${n} メ`,
                `░S░h░a░n░t░o░`,
                `⚝❊ ${n} ❊⚝`,
                `༄I𝒩𝒟 ${n.toUpperCase()} ࿐`,
                `⚝✨ ${n} ࿐`,
                `ᴵᴺ𝒟 ${n} 亗`,
                `╰╯⚡ ${n} ★⚝`,
                `⚝✨♜ ${n} ♜⚝`,
                `亗 COOL ${n} ×͜×`,
                `⚝☬ ${n} ☬⚝`
            ];

            styles.forEach(s => {
                let card = `<div class="name-card">
                    <div class="name-text">${s}</div>
                    <button class="copy-btn" onclick="copyText('${s}')">Copy</button>
                </div>`;
                area.innerHTML += card;
            });
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("Copied: " + text);
            });
        }
    </script>
</body>
</html>
