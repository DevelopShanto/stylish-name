cat <<EOF > index.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Name - Shanto</title>
    <style>
        body { background-color: #000; color: #00e5ff; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .header-glow { text-shadow: 0 0 15px #00e5ff; font-size: 26px; margin-top: 15px; }
        .social-info { font-size: 13px; font-weight: bold; margin-bottom: 20px; }
        .tiktok { color: #ff0050; }
        .facebook { color: #0084ff; }
        .container { background: #000; max-width: 550px; margin: auto; }
        input { width: 65%; background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 5px; outline: none; margin-bottom: 10px; }
        .magic-btn { background: #00e5ff; color: #000; padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0a0a0a; }
        th { background: #1a1a1a; color: #fff; padding: 10px; border: 1px solid #333; }
        td { padding: 15px 5px; border: 1px solid #333; color: #00e5ff; font-size: 16px; }
        .copy-icon { font-size: 10px; background: #222; color: #eee; padding: 5px 8px; border-radius: 4px; margin-left: 5px; cursor: pointer; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1 class="header-glow">As-salamu Alaykum</h1>
    <div class="social-info">
        <span class="tiktok">TikTok: @shanto2993</span> | 
        <span class="facebook">FB: Classic Boy Shanto</span>
    </div>
    <div class="container">
        <input type="text" id="nameInput" placeholder="Enter Name...">
        <button class="magic-btn" onclick="generate()">Magic</button>
        <table>
            <thead><tr><th>Design Styles</th><th>Action</th></tr></thead>
            <tbody id="resultTable"></tbody>
        </table>
    </div>
    <script>
        function generate() {
            const n = document.getElementById('nameInput').value;
            const table = document.getElementById('resultTable');
            table.innerHTML = "";
            if(!n) return;

            const styles = [
                "╰"+n+"╮", "亗 "+n+" 亗", "『"+n+"』", "★"+n+"★", "♛ "+n+" ♛", "〆"+n+"〆",
                "───⊱◈ "+n+" ◈⊰───", "◥꧁"+n+"꧂◤", "꧁❤•"+n+"•❤꧂", "×º°”˜`”°º× "+n+" ×º°”˜`”°º×",
                "•—•—• "+n+" •—•—•", "❤( ᵘ ᵌᵘ) ❤️ "+n+" ❤️❤️( ᵘ ᵌᵘ) ❤️", "⚡"+n+"★", "♔ "+n+" ♔",
                "『ST』 "+n, "V I P "+n, "I love you <3 "+n, "///❤️/// "+n+" ///❤️///",
                "꧁☯︎"+n+"☯︎꧂", "⫷"+n+"⫸", "【"+n+"】", "『"+n+"』", "⟨"+n+"⟩", "«"+n+"»",
                "⚔️ "+n+" ⚔️", "☬ "+n+" ☬", "✿ "+n+" ✿", "❃ "+n+" ❃", "☁ "+n+" ☁"
            ];

            styles.forEach(s => {
                table.innerHTML += "<tr><td>"+s+"</td><td><span class='copy-icon' onclick='cp(\""+s+"\")'>CPY</span></td></tr>";
            });
        }
        function cp(t) { navigator.clipboard.writeText(t).then(() => alert("Copied: " + t)); }
    </script>
</body>
</html>
EOF
