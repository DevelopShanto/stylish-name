<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylish Name - Shanto</title>
    <style>
        body { background-color: #000; color: #00e5ff; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .header-glow { text-shadow: 0 0 15px #00e5ff, 0 0 25px #00e5ff; font-size: 26px; margin-top: 15px; }
        .social-info { font-size: 13px; font-weight: bold; margin-bottom: 20px; }
        .tiktok { color: #ff0050; text-shadow: 0 0 10px #ff0050; }
        .facebook { color: #0084ff; text-shadow: 0 0 10px #0084ff; }
        .container { background: #0a0a0a; max-width: 500px; margin: auto; padding: 20px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 0 20px rgba(0,229,255,0.1); }
        input { width: 85%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; outline: none; text-align: center; font-size: 18px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #111; color: #fff; font-size: 18px; text-align: left; }
        .copy-btn { background: #00e5ff; color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; float: right; }
    </style>
</head>
<body>
    <h1 class="header-glow">As-salamu Alaykum</h1>
    <div class="social-info">
        <span class="tiktok">TikTok: @shanto2993</span> | 
        <span class="facebook">FB: Classic Boy Shanto</span>
    </div>
    <div class="container">
        <input type="text" id="nameInput" placeholder="Enter Name..." oninput="gen()">
        <table id="res"></table>
    </div>
    <script>
        function gen() {
            const n = document.getElementById('nameInput').value;
            const r = document.getElementById('res'); r.innerHTML = "";
            if(!n) return;
            const s = ["дЇЧ "+n+" дЇЧ", "кІБаЉЇ"+n+"аЉїкІВ", "гАОSTгАП"+n, "гАЖ"+n+"гАЖ", "вШЕ"+n+"вШЕ", "вФАвФАвФАвК±вЧИ "+n+" вЧИвК∞вФАвФАвФА", "вЧ•кІБ"+n+"кІВвЧ§", "кІБвЭ§вАҐ"+n+"вАҐвЭ§кІВ", "вЪ°"+n+"вШЕ", "вЩФ "+n+" вЩФ", "V I P "+n, "///вЭ§пЄП/// "+n, "вЪФпЄП "+n+" вЪФпЄП", "вШђ "+n+" вШђ", "вЬњ "+n+" вЬњ"];
            s.forEach(st => {
                r.innerHTML += "<tr><td>"+st+"<button class='copy-btn' onclick='cp(\""+st+"\")'>COPY</button></td></tr>";
            });
        }
        function cp(t) { navigator.clipboard.writeText(t).then(() => alert("Copied!")); }
    </script>
</body>
</html>
